server {
    listen 80;

    # Serve the static files for the frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend service. Resolve the `api` upstream via
    # Docker's embedded DNS at request time (through a variable) instead of once at
    # config load — otherwise nginx pins the api container's first IP forever and a
    # restarted/rescheduled api container 502s until nginx is reloaded.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:3000;

    location /api/ {
        # With a variable in proxy_pass, nginx does NOT append the matched location
        # path, so pass the full original request URI explicitly — otherwise every
        # /api/<path> collapses to /api/ and 404s.
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
