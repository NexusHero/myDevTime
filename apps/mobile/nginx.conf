server {
    listen 80;

    # Serve the static files for the frontend. The Expo static export writes flat
    # per-route HTML (`planner.html`, `projects.html`) PLUS a directory when a route
    # has children (`projects/[projectId].html`) — so `$uri.html` must be tried
    # before `$uri/`, or `/projects` matches the directory and 301s to `/projects/`.
    # `absolute_redirect off` keeps any remaining redirect relative: nginx only
    # knows its container-internal port 80, so an absolute redirect drops the
    # published port (e.g. `:8080` → `http://host/projects/`) and lands on a closed
    # port — the #337 deep-link failure.
    absolute_redirect off;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Proxy /api requests to the backend service. Resolve the `api` upstream via
    # Docker's embedded DNS at request time (through a variable) instead of once at
    # config load — otherwise nginx pins the api container's first IP forever and a
    # restarted/rescheduled api container 502s until nginx is reloaded.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:3000;

    location /api/ {
        # With a variable in proxy_pass, nginx does NOT append the matched location
        # path, so pass the full original request URI explicitly — otherwise every
        # /api/<path> collapses to /api/ and 404s.
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
