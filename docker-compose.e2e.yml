# E2E overlay for the acceptance tests (ADR-0053). Layered on docker-compose.yml,
# it configures the api so a browser test can sign up + sign in without a mailbox:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
#   (cd e2e && pnpm install --ignore-workspace && pnpm exec playwright install chromium && pnpm test)
# The stack stays in the compose-default NODE_ENV=development, where turning email
# verification off is allowed (the config refine forbids it in production).
services:
  api:
    environment:
      NODE_ENV: development
      # Non-prod escape hatch so seeded accounts can sign in immediately (ADR-0053).
      AUTH_REQUIRE_EMAIL_VERIFICATION: 'false'
      # Acceptance tests fire many sign-ups/sign-ins from one runner IP; relax the
      # abuse limiter for E2E only (the config refine keeps it forced on in prod).
      AUTH_RATE_LIMIT_ENABLED: 'false'
      # A throwaway secret (>=32 chars) — E2E only, never a real deployment.
      AUTH_SECRET: 'e2e-insecure-secret-not-for-production-0123456789'
      # The web origin (nginx) the browser and its API calls come from.
      AUTH_BASE_URL: 'http://localhost:8080'
      TRUSTED_ORIGINS: 'http://localhost:8080'
