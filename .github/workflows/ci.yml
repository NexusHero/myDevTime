name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One in-flight run per ref; newer pushes cancel older runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Local gate (format · lint · typecheck · tests · docs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the gate
        run: ./test.sh

      - name: Emit OpenAPI spec
        # The script runs in the package dir (apps/api); default output is
        # apps/api/openapi.json, which the upload step below picks up.
        run: pnpm --filter @mydevtime/api openapi:emit

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: openapi
          path: apps/api/openapi.json

  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mydevtime
          POSTGRES_PASSWORD: mydevtime
          POSTGRES_DB: mydevtime
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mydevtime"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://mydevtime:mydevtime@localhost:5432/mydevtime
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/api tests import @mydevtime/domain through its built dist entrypoint.
      - name: Build workspace packages
        run: pnpm --filter "./packages/*" build

      - name: Apply migrations
        run: pnpm --filter @mydevtime/api db:migrate

      - name: Run tests against Postgres
        run: pnpm test

  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: bash scripts/check-conventional-commits.sh "origin/${{ github.base_ref }}" "${{ github.sha }}"
