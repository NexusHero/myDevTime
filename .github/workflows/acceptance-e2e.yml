name: Acceptance (E2E)

# Browser acceptance tests (ADR-0053): drive the built app through a real browser
# against the running Docker stack. Slower than the vitest/integration tiers, so it
# runs on merges to main, on demand, and on PRs that change the app, the auth/config
# surface, or the E2E harness itself — not on pure-docs PRs.
on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'e2e/**'
      - 'apps/api/Dockerfile'
      - 'apps/mobile/Dockerfile'
      - 'apps/mobile/nginx.conf'
      - 'docker-compose.yml'
      - 'docker-compose.e2e.yml'
      - '.github/workflows/acceptance-e2e.yml'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Browser acceptance vs the running stack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the E2E stack
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml build

      - name: Start the stack
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d

      - name: Wait for the web app
        run: |
          for _ in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/)" = "200" ]; then
              echo "web is up"; exit 0
            fi
            sleep 2
          done
          echo "web did not come up in time" >&2; exit 1

      - name: Install E2E deps + browser
        working-directory: e2e
        # --ignore-workspace: e2e/ lives outside the pnpm workspace, so a plain
        # `pnpm install` here walks up to the root pnpm-workspace.yaml and installs
        # the 6 workspace projects instead of e2e's own deps (Playwright never
        # lands). Ignoring the workspace installs e2e/package.json in isolation.
        run: |
          pnpm install --ignore-workspace --no-frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Run acceptance tests
        working-directory: e2e
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:8080
        run: pnpm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs --no-color --tail 200

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
