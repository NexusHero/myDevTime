name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  # Dependency vulnerability gate. `pnpm audit` was retired here (2026-07): npm
  # returned HTTP 410 for its audit endpoints ("use the bulk advisory endpoint"),
  # breaking `pnpm audit` registry-wide. OSV-Scanner reads the lockfile and queries
  # the OSV database directly, so it does not depend on the npm audit endpoint.
  # Accepted advisories (Expo build-CLI `tar` only, never shipped) are allowlisted
  # in `osv-scanner.toml` and documented, with a revisit trigger, in
  # docs/security/audit-exceptions.md.
  audit:
    name: OSV vulnerability scan (dependencies)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.2.2
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --lockfile=./pnpm-lock.yaml
        --config=./osv-scanner.toml
      fail-on-vuln: true

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Requires the repository Dependency Graph (Settings → Code security).
    # Informational (continue-on-error) until that is enabled.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: high
