name: Release

on:
  push:
    tags:
      - 'v*' # e.g. v1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, e.g. v1.0.0 (created if missing)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate
        run: ./test.sh

      - name: Build
        run: pnpm build

      - name: Emit OpenAPI spec
        run: pnpm --filter @mydevtime/api openapi:emit

      - name: Publish release with the OpenAPI spec
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: apps/api/openapi.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
