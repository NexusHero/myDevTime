name: Feature request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check the roadmap (`docs/roadmap.md`) and the Requirements
        Register (`docs/architecture.md` §1) — the work may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What situation prompted this? ("As a developer/freelancer I want...")
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Backend — apps/api (Fastify)
        - Domain logic — packages/domain / packages/shared
        - Mobile/Web client — apps/mobile
        - Build / CI / tooling
        - Docs / ADRs
        - New component
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
