<!-- @dsCard group="Colors" viewport="700x140" name="Semantic status" subtitle="Good · critical · warning · info" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-ui);background:var(--surface);display:flex;gap:12px;}
  .chip{flex:1;border-radius:var(--radius-block);padding:14px;text-align:center;font-size:12px;font-weight:600;}
</style>
<div class="chip" style="background:var(--good-soft);color:var(--good)">Good / kept</div>
<div class="chip" style="background:var(--crit-soft);color:var(--crit)">Critical / dropped</div>
<div class="chip" style="background:var(--warn-soft);color:var(--warn)">Warning / drift</div>
<div class="chip" style="background:var(--info-soft);color:var(--info)">Info</div>
