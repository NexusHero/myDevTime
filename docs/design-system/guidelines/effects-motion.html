<!-- @dsCard group="Spacing" viewport="700x150" name="Motion" subtitle="ease-out (chrome) vs ease-spring (Day Canvas / Island)" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-ui);background:var(--surface);}
  .row{display:flex;gap:24px;}
  .lane{flex:1;}
  .l{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);margin-bottom:8px;}
  .track{position:relative;height:40px;background:var(--surface-sunk);border-radius:var(--radius-block);overflow:hidden;}
  .dot{position:absolute;top:6px;left:6px;width:28px;height:28px;border-radius:50%;background:var(--accent);animation:move 1.8s infinite;}
  .spring .dot{animation-timing-function:var(--ease-spring);}
  .out .dot{animation-timing-function:var(--ease-out);}
  @keyframes move{0%,20%{left:6px}80%,100%{left:calc(100% - 34px)}}
</style>
<div class="row">
  <div class="lane out"><div class="l">--ease-out · chrome, hovers</div><div class="track"><div class="dot"></div></div></div>
  <div class="lane spring"><div class="l">--ease-spring · blocks, Island</div><div class="track"><div class="dot"></div></div></div>
</div>
