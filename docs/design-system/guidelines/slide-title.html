<!-- @dsCard group="Slides" viewport="1280x720" name="Animated title slide" subtitle="16:9 Titel-Slide — Mark springt ein, Playhead sweept über die Slide, Titel steigt. Loopt zur Demo." -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>myDevTime — Titel-Slide</title>
<link rel="stylesheet" href="../styles.css">
<style>
  :root { --loop: 6s; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--font-ui); }
  a { color: #9db1ff; } a:hover { color: #fff; }
  .slide {
    width: 1280px; height: 720px; position: relative; overflow: hidden;
    background: radial-gradient(120% 150% at 18% 0%, #1a2c6e 0%, #0e1638 55%, #0a0c14 100%);
    display: flex; flex-direction: column; justify-content: center; padding: 0 110px;
  }
  .grid { position: absolute; inset: 0; opacity: 0.3; pointer-events: none;
    background-image: linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 106px 100%; }
  /* the playhead sweeps once across the whole slide, then parks at 62% */
  .sweep { position: absolute; top: 0; bottom: 0; left: 62%; width: 3px;
    background: var(--live); box-shadow: 0 0 18px rgba(255,83,32,0.75);
    animation: park var(--loop) var(--ease-out) infinite; }
  .sweep::after { content: ''; position: absolute; top: 54px; left: -5.5px; width: 14px; height: 14px;
    border-radius: 50%; background: var(--live); }

  .mark { position: relative; width: 84px; height: 84px; border-radius: 20px;
    background: linear-gradient(135deg, #3D5CF5 0%, #2941B8 100%);
    box-shadow: 0 18px 44px -12px rgba(61,92,245,0.6);
    animation: m-in var(--loop) var(--ease-spring) infinite; }
  .mark .actual { position: absolute; left: 15px; top: 31px; width: 21px; height: 25px; border-radius: 6px; background: #fff; animation: a-in var(--loop) var(--ease-spring) infinite; }
  .mark .ghost { position: absolute; left: 48px; top: 31px; width: 21px; height: 25px; border-radius: 6px; border: 2.5px dashed rgba(255,255,255,0.8); animation: g-in var(--loop) ease infinite; }
  .mark .ph { position: absolute; left: 40px; top: 25px; width: 4px; height: 36px; border-radius: 2px; background: var(--live); transform-origin: top center; animation: ph-in var(--loop) var(--ease-out) infinite; }
  .mark .dot { position: absolute; left: 37.5px; top: 14px; width: 9px; height: 9px; border-radius: 50%; background: var(--live); animation: dot-in var(--loop) ease infinite; }

  .kicker { margin: 44px 0 0; font-family: var(--font-mono); font-size: 17px; letter-spacing: 0.14em;
    color: var(--live); text-transform: uppercase; animation: rise var(--loop) var(--ease-out) infinite; }
  h1 { margin: 14px 0 0; font-family: var(--font-display); font-weight: 700; letter-spacing: -0.03em;
    font-size: 84px; line-height: 1.02; color: #fff; max-width: 820px;
    animation: rise2 var(--loop) var(--ease-out) infinite; }
  .meta { margin-top: 34px; display: flex; gap: 26px; color: rgba(255,255,255,0.55); font-size: 19px;
    animation: rise3 var(--loop) var(--ease-out) infinite; }
  .meta b { color: #fff; font-weight: 600; }

  @keyframes park { 0% { left: 3%; opacity: 0; } 6% { opacity: 1; } 34% { left: 62%; } 96% { left: 62%; opacity: 1; } 100% { left: 62%; opacity: 0; } }
  @keyframes m-in { 0% { transform: scale(0.5); opacity: 0; } 6% { opacity: 1; } 10% { transform: scale(1.07); } 15%, 96% { transform: scale(1); opacity: 1; } 100% { opacity: 0; } }
  @keyframes a-in { 0%, 8% { transform: translateX(-12px); opacity: 0; } 16% { transform: translateX(1px); opacity: 1; } 20%, 100% { transform: none; opacity: 1; } }
  @keyframes g-in { 0%, 13% { opacity: 0; } 23%, 100% { opacity: 1; } }
  @keyframes ph-in { 0%, 4% { transform: scaleY(0); } 12%, 100% { transform: scaleY(1); } }
  @keyframes dot-in { 0%, 6% { transform: scale(0); } 11% { transform: scale(1.4); } 15%, 100% { transform: scale(1); } }
  @keyframes rise  { 0%, 10% { transform: translateY(20px); opacity: 0; } 20%, 100% { transform: none; opacity: 1; } }
  @keyframes rise2 { 0%, 14% { transform: translateY(24px); opacity: 0; } 26%, 100% { transform: none; opacity: 1; } }
  @keyframes rise3 { 0%, 20% { transform: translateY(20px); opacity: 0; } 32%, 100% { transform: none; opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    .sweep, .mark, .mark *, .kicker, h1, .meta { animation: none !important; }
  }
</style>
</head>
<body>
<div class="slide" data-screen-label="Titel">
  <div class="grid"></div>
  <div class="sweep"></div>
  <div class="mark">
    <span class="actual"></span><span class="ghost"></span><span class="ph"></span><span class="dot"></span>
  </div>
  <p class="kicker">myDevTime · Produkt-Update</p>
  <h1>Dein Tag, geplant. Dein Jetzt, sichtbar.</h1>
  <div class="meta"><span><b>Suhay Sevinc</b></span><span>Juli 2026</span></div>
</div>
</body>
</html>
