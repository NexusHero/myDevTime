<!-- @dsCard group="Spacing" viewport="700x150" name="8-pt spacing grid" subtitle="4 -> 64px" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-ui);background:var(--surface);}
  .row{display:flex;align-items:flex-end;gap:10px;height:80px;}
  .b{background:var(--accent);border-radius:2px;width:28px;}
  .l{font-family:var(--font-mono);font-size:10px;color:var(--ink-2);text-align:center;margin-top:4px;}
  .col{display:flex;flex-direction:column;align-items:center;}
</style>
<div class="row">
  <div class="col"><div class="b" style="height:var(--space-1)"></div><div class="l">4</div></div>
  <div class="col"><div class="b" style="height:var(--space-2)"></div><div class="l">8</div></div>
  <div class="col"><div class="b" style="height:var(--space-3)"></div><div class="l">12</div></div>
  <div class="col"><div class="b" style="height:var(--space-4)"></div><div class="l">16</div></div>
  <div class="col"><div class="b" style="height:var(--space-5)"></div><div class="l">24</div></div>
  <div class="col"><div class="b" style="height:var(--space-6)"></div><div class="l">32</div></div>
  <div class="col"><div class="b" style="height:var(--space-7)"></div><div class="l">48</div></div>
  <div class="col"><div class="b" style="height:var(--space-8)"></div><div class="l">64</div></div>
</div>
