<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="myDevTime">
  <title>myDevTime (monochrome)</title>
  <!-- Single-colour mark: inherits `color` via currentColor. No tile, so it drops
       onto any surface. Use for embossing, favicons on solid grounds, print. -->
  <g fill="currentColor">
    <rect x="24" y="30" width="44" height="9" rx="4.5"/>
    <rect x="24" y="47" width="34" height="9" rx="4.5"/>
    <rect x="24" y="64" width="40" height="9" rx="4.5"/>
    <circle cx="54" cy="23" r="4.4"/>
  </g>
  <line x1="54" y1="23" x2="54" y2="75" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
</svg>
