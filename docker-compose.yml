# Full local stack from the production Docker images (ADR-0052): postgres + redis,
# a one-off migrate step, the api (NODE_ENV=production, so email verification and
# the auth rate limiter are enforced), and the web/nginx edge published on :8080.
#   docker compose up -d
#
# Because this runs in production mode, a freshly seeded account cannot sign in
# through the UI (no mailbox to verify its email). For a click-through demo where
# sign-in works, add the E2E overlay, which drops to NODE_ENV=development and turns
# the mailbox/rate-limit gates off (docker-compose.e2e.yml, ADR-0053):
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
#   pnpm --filter @mydevtime/api db:seed   # populate demo data (admin@test.de)
#
# The bundled postgres is also the local dev database used by the app tests:
#   DATABASE_URL=postgres://mydevtime:mydevtime@localhost:5433/mydevtime \
#     pnpm --filter @mydevtime/api db:migrate
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mydevtime
      POSTGRES_PASSWORD: mydevtime
      POSTGRES_DB: mydevtime
    ports:
      - '5433:5432'
    volumes:
      - mydevtime-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mydevtime']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Not published to the host — only the api service needs it, over the compose network.
    volumes:
      - mydevtime-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-off migration step, decoupled from the app containers (12-factor VI). Runs
  # once to completion; the api waits for it via `service_completed_successfully`.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ['node', 'dist/db/migrate.js']
    environment:
      DATABASE_URL: postgres://mydevtime:mydevtime@postgres:5432/mydevtime
      NODE_ENV: production
      AUTH_SECRET: dev-insecure-secret-not-for-production-use-only-32chars
      AUTH_BASE_URL: http://localhost:8080
      TRUSTED_ORIGINS: http://localhost:8080,http://localhost:8081,http://192.168.1.121:8081
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://mydevtime:mydevtime@postgres:5432/mydevtime
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
      AUTH_SECRET: dev-insecure-secret-not-for-production-use-only-32chars
      TRUSTED_ORIGINS: http://localhost:8080,http://localhost:8081,http://192.168.1.121:8081
      AUTH_BASE_URL: http://localhost:8080
      # The API sits behind the web container's nginx, so trust its X-Forwarded-* for the
      # rate limiter's client IP (ADR-0050). Never enable when the API is directly reachable.
      TRUST_PROXY: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
      args:
        # Same origin as the published port below; nginx proxies /api to the api service.
        EXPO_PUBLIC_API_URL: http://localhost:8080
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  mydevtime-pg:
  mydevtime-redis:
