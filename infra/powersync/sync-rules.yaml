# PowerSync sync rules — DRAFT, validate against the running service (see README).
#
# One bucket per workspace the authenticated client may access. The parameter is
# taken from the JWT our NestJS backend mints for the device (claim: `workspace_id`),
# so every synced row is filtered by `workspace_id` — workspace isolation holds at
# the sync layer exactly as it does in the API and the local store (REQ-006).
#
# Every listed table has a TEXT `id` primary key (PowerSync requires an `id` column).
# `preferences` is intentionally omitted: it keys on (workspace_id, key) with no `id`
# column, so it cannot sync as-is — it stays device-local until it gains an `id`
# (tracked in the integration issue).
#
# NOTE: confirm the parameter accessor against the deployed service version — recent
# PowerSync moved from `token_parameters.*` toward `request.parameters()/request.jwt()`.

bucket_definitions:
  workspace:
    parameters: SELECT token_parameters.workspace_id AS workspace_id
    data:
      - SELECT * FROM clients WHERE workspace_id = bucket.workspace_id
      - SELECT * FROM projects WHERE workspace_id = bucket.workspace_id
      - SELECT * FROM tasks WHERE workspace_id = bucket.workspace_id
      - SELECT * FROM time_entries WHERE workspace_id = bucket.workspace_id
      - SELECT * FROM rates WHERE workspace_id = bucket.workspace_id
      - SELECT * FROM budgets WHERE workspace_id = bucket.workspace_id
      - SELECT * FROM shifts WHERE workspace_id = bucket.workspace_id
      - SELECT * FROM absences WHERE workspace_id = bucket.workspace_id
      - SELECT * FROM credit_entries WHERE workspace_id = bucket.workspace_id
