apiVersion: batch/v1
kind: Job
metadata:
  name: api-migrate
  annotations:
    # Optional annotation if using ArgoCD or Helm hooks, but good practice
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
      containers:
        - name: api-migrate
          image: ghcr.io/orga/mydevtime-api:latest
          command: ['node', 'dist/db/migrate.js']
          env:
            - name: DATABASE_URL
              value: 'postgres://mydevtime:mydevtime-secure-password@postgres:5432/mydevtime'
            - name: NODE_ENV
              value: 'production'
      restartPolicy: Never
  backoffLimit: 4
