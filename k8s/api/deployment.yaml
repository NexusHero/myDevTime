apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/orga/mydevtime-api:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: 'postgres://mydevtime:mydevtime-secure-password@postgres:5432/mydevtime'
            - name: REDIS_URL
              value: 'redis://redis:6379'
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3000'
            - name: TRUST_PROXY
              value: 'true'
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: AUTH_SECRET
            - name: AUTH_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: AUTH_BASE_URL
            - name: TRUSTED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TRUSTED_ORIGINS
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
