apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Bootstrap tag; the deploy workflow pins the exact SHA via `kubectl set image`.
          image: ghcr.io/nexushero/mydevtime-api:latest
          imagePullPolicy: Always
          env:
            # Compose DATABASE_URL from the postgres secret so the password never
            # appears in plaintext in this manifest. `$(POSTGRES_PASSWORD)` is
            # interpolated by the kubelet because it is defined earlier in the list.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: 'postgres://mydevtime:$(POSTGRES_PASSWORD)@postgres:5432/mydevtime'
            - name: REDIS_URL
              value: 'redis://redis:6379'
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3000'
            - name: TRUST_PROXY
              value: 'true'
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: AUTH_SECRET
            - name: AUTH_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: AUTH_BASE_URL
            - name: TRUSTED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TRUSTED_ORIGINS
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 512Mi
          # Liveness = process is up (no I/O); readiness = DB + Redis reachable, so a
          # pod only takes traffic once its dependencies answer (health.controller.ts).
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
