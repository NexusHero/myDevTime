# OSV-Scanner config (CI dependency gate — .github/workflows/security.yml, ADR-0016).
# Accepted advisories are documented, with a revisit trigger, in
# docs/security/audit-exceptions.md. Every entry below is `tar` reached only via
# `apps/mobile > expo > @expo/cli > tar` — the archive extractor the Expo *build
# CLI* uses at build time. It never ships in the app bundle and never runs on a
# device or server; `@expo/cli` pins `tar@^6`, and the patched line is `tar@>=7`,
# so bumping it breaks the CLI. Revisit on each Expo SDK upgrade and drop any
# GHSA that no longer resolves.

